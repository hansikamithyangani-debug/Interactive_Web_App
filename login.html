<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<header>
    <h1>User Login</h1>
</header>

<section class="form-box">

</section>

<script src="./app.js"></script>
</body>
</html>
